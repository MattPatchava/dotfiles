set -g mouse on
setw -g mode-keys vi
setw -g pane-border-status top
setw -g pane-border-format "#{pane_index}: #{pane_title}"

# New panes inherit the current pane's working directory
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# New windows inherit the current pane's working directory
bind c new-window -c "#{pane_current_path}"

# --- Copy-mode vim bindings ---
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind -T copy-mode-vi Escape send-keys -X cancel

# OSC52 clipboard
set -g allow-passthrough on
set -g set-clipboard on

# Vim-style pane navigation (prefix)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Optional: No-prefix navigation (recommended)
bind -n C-h select-pane -L
bind -n C-j select-pane -D
bind -n C-k select-pane -U
bind -n C-l select-pane -R
